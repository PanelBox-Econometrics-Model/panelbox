<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'common/meta.html' %}

    <!-- Embedded CSS -->
    <style>
        {{ css_inline|safe }}
    </style>

    {% block extra_css %}{% endblock %}

    <!-- Plotly.js (must load before chart divs) -->
    {{ plotly_js|safe }}
</head>
<body>
    <div class="report-container">
        <!-- Branded Header with Logo -->
        {% include 'common/header_v2.html' %}

        <!-- Summary Dashboard -->
        {% block summary %}{% endblock %}

        <!-- Main Content -->
        {% block content %}{% endblock %}

        <!-- Footer -->
        {% include 'common/footer.html' %}
    </div>

    <!-- Embedded JavaScript -->
    {% if js_inline %}
    <script>
        {{ js_inline|safe }}
    </script>
    {% endif %}

    {% block extra_js %}{% endblock %}
</body>
</html>
